<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MoviePlay Mini App</title>
    
    <!-- Telegram Mini App SDK -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    
    <!-- YOUR MONETAG SCRIPT - PASTED HERE -->
    <script src='//libtl.com/sdk.js' data-zone='10741458' data-sdk='show_10741458'></script>
    
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #1a1a1a;
            color: white;
            margin: 0;
            padding: 20px;
            text-align: center;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
        }
        h1 {
            color: #ffcc00;
        }
        .movie-card {
            background: #2d2d2d;
            border-radius: 12px;
            padding: 20px;
            margin: 20px 0;
        }
        button {
            background: #ffcc00;
            color: #1a1a1a;
            border: none;
            padding: 15px 30px;
            border-radius: 8px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            margin: 10px;
        }
        .reward-btn {
            background: #00cc88;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎬 MoviePlay</h1>
        <p>Search movies and earn rewards!</p>
        
        <div class="movie-card">
            <h2>Featured Movie</h2>
            <p>Search any movie in @MoviePlay.ngBot</p>
        </div>
        
        <!-- Example button to trigger Monetag Rewarded Ad -->
        <button class="reward-btn" onclick="showRewardedAd()">
            ⭐ Watch Ad & Get Reward
        </button>
        
        <button onclick="window.Telegram.WebApp.close()">
            Close
        </button>
    </div>

    <script>
        // Initialize Telegram Mini App
        const tg = window.Telegram.WebApp;
        tg.expand(); // Make app full screen
        
        // Function to show Monetag rewarded ad
        function showRewardedAd() {
            if (typeof show_10741458 === 'function') {
                show_10741458().then(() => {
                    // User watched the ad - give reward
                    alert('🎉 Thanks! You earned 10 coins!');
                    console.log('Reward granted');
                }).catch(error => {
                    alert('Ad failed to load. Try again.');
                    console.error('Ad error:', error);
                });
            } else {
                alert('Ad SDK not ready yet');
                console.log('Monetag SDK loading...');
            }
        }
        
        // Optional: Auto-load an interstitial ad
        if (typeof show_10741458 === 'function') {
            // Show interstitial after 10 seconds (example)
            setTimeout(() => {
                show_10741458({ type: 'inApp' }).catch(() => {});
            }, 10000);
        }
        
        console.log('Mini App loaded with Monetag');
    </script>
</body>
</html>
